<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Outer circle representing wholeness -->
  <circle cx="32" cy="32" r="30" stroke="#CC3C2C" stroke-width="2.5" fill="#FDF8F2"/>
  <!-- Stylized lotus with 8 petals in vermillion -->
  <g transform="translate(32,32)">
    <!-- Central hub -->
    <circle r="6" fill="#CC3C2C"/>
    <circle r="3.5" fill="#C8922A"/>
    <!-- 8 lotus petals -->
    <ellipse rx="5" ry="12" fill="#CC3C2C" opacity="0.85" transform="rotate(0) translate(0,-13)"/>
    <ellipse rx="5" ry="12" fill="#CC3C2C" opacity="0.85" transform="rotate(45) translate(0,-13)"/>
    <ellipse rx="5" ry="12" fill="#CC3C2C" opacity="0.85" transform="rotate(90) translate(0,-13)"/>
    <ellipse rx="5" ry="12" fill="#CC3C2C" opacity="0.85" transform="rotate(135) translate(0,-13)"/>
    <ellipse rx="5" ry="12" fill="#CC3C2C" opacity="0.85" transform="rotate(180) translate(0,-13)"/>
    <ellipse rx="5" ry="12" fill="#CC3C2C" opacity="0.85" transform="rotate(225) translate(0,-13)"/>
    <ellipse rx="5" ry="12" fill="#CC3C2C" opacity="0.85" transform="rotate(270) translate(0,-13)"/>
    <ellipse rx="5" ry="12" fill="#CC3C2C" opacity="0.85" transform="rotate(315) translate(0,-13)"/>
    <!-- Inner layer petals (gold) -->
    <ellipse rx="3" ry="8" fill="#C8922A" opacity="0.9" transform="rotate(22.5) translate(0,-9)"/>
    <ellipse rx="3" ry="8" fill="#C8922A" opacity="0.9" transform="rotate(67.5) translate(0,-9)"/>
    <ellipse rx="3" ry="8" fill="#C8922A" opacity="0.9" transform="rotate(112.5) translate(0,-9)"/>
    <ellipse rx="3" ry="8" fill="#C8922A" opacity="0.9" transform="rotate(157.5) translate(0,-9)"/>
    <ellipse rx="3" ry="8" fill="#C8922A" opacity="0.9" transform="rotate(202.5) translate(0,-9)"/>
    <ellipse rx="3" ry="8" fill="#C8922A" opacity="0.9" transform="rotate(247.5) translate(0,-9)"/>
    <ellipse rx="3" ry="8" fill="#C8922A" opacity="0.9" transform="rotate(292.5) translate(0,-9)"/>
    <ellipse rx="3" ry="8" fill="#C8922A" opacity="0.9" transform="rotate(337.5) translate(0,-9)"/>
    <!-- Center dot -->
    <circle r="2" fill="#FDF8F2"/>
  </g>
</svg>
