name: Deploy Vermillion to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Configure site URL and basePath
        run: |
          node -e "
            const fs = require('fs');
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            const config = JSON.parse(fs.readFileSync('site.config.json', 'utf-8'));
            if (config.site.url === 'https://username.github.io') {
              config.site.url = 'https://' + owner + '.github.io';
              if (repo !== owner + '.github.io') {
                config.site.basePath = '/' + repo + '/';
              }
              fs.writeFileSync('site.config.json', JSON.stringify(config, null, 2));
            }
          "
      - run: npm run build
      - run: npx -y pagefind --site dist
      - name: Inject Built with Jinpa badge
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const config = JSON.parse(fs.readFileSync('site.config.json', 'utf-8'));
            const key = (config.jinpaKey || '').trim();
            const validKey = /^JNP-[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}$/.test(key);
            if (validKey) { process.exit(0); }
            const badge = \`<a href=\"https://getjinpa.com\" target=\"_blank\" rel=\"noopener noreferrer\" id=\"jinpa-badge\" style=\"position:fixed;bottom:1rem;right:1rem;z-index:9999;display:inline-flex;align-items:center;gap:0.375rem;padding:0.375rem 0.75rem;background:#1e40af;color:#fff;font-family:system-ui,sans-serif;font-size:0.75rem;font-weight:600;text-decoration:none;border-radius:9999px;box-shadow:0 2px 8px rgba(0,0,0,0.25);\">Built with Jinpa</a>\`;
            function walk(dir) {
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const full = path.join(dir, entry.name);
                if (entry.isDirectory()) walk(full);
                else if (entry.name.endsWith('.html')) {
                  const html = fs.readFileSync(full, 'utf-8');
                  if (!html.includes('id=\"jinpa-badge\"')) {
                    fs.writeFileSync(full, html.replace('</body>', badge + '\n</body>'));
                  }
                }
              }
            }
            walk('./dist');
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
